<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Full-stack development portfolio PDF."
    />
    <meta name="theme-color" content="#f4f5f5" />
    <title>Full-Stack Portfolio</title>
    <script>
      (() => {
        let savedTheme = null;
        try {
          savedTheme = localStorage.getItem("portfolio-theme");
        } catch {}

        const systemTheme = window.matchMedia?.(
          "(prefers-color-scheme: dark)",
        ).matches
          ? "dark"
          : "light";

        document.documentElement.dataset.theme = savedTheme || systemTheme;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css?v=2" />
    <script src="./app.js?v=2" defer></script>
  </head>
  <body>
    <main class="page">
      <header class="toolbar">
        <nav class="external-links" aria-label="External links">
          <a href="https://github.com/yuchanahn" target="_blank" rel="noreferrer">
            GitHub
          </a>
          <a href="https://personaxi.com" target="_blank" rel="noreferrer">
            PeroChat
          </a>
        </nav>

        <div class="preferences">
          <div class="segmented" role="group" aria-label="Language">
            <button type="button" data-language="ko">한국어</button>
            <button type="button" data-language="en">English</button>
          </div>
          <div class="segmented" role="group" aria-label="Theme">
            <button type="button" data-theme-choice="light">Light</button>
            <button type="button" data-theme-choice="dark">Dark</button>
          </div>
        </div>
      </header>

      <section class="center" aria-label="Portfolio actions">
        <div class="document-actions">
          <a
            class="button button-primary"
            href="./assets/portfolio.pdf"
            target="_blank"
            rel="noreferrer"
            data-i18n="openPdf"
          >
            PDF 보기
          </a>
          <a
            class="button"
            href="./assets/portfolio.pdf"
            download="full-stack-portfolio.pdf"
            data-i18n="downloadPdf"
          >
            다운로드
          </a>
          <button
            id="search-toggle"
            class="search-trigger"
            type="button"
            aria-controls="search-panel"
            aria-expanded="false"
            aria-label="포트폴리오 검색"
            title="포트폴리오 검색"
          >
            <span class="magnifier" aria-hidden="true"></span>
          </button>
        </div>

        <div id="search-panel" class="search-panel" hidden>
          <div class="search-bar">
            <span class="magnifier magnifier-small" aria-hidden="true"></span>
            <label class="sr-only" for="search-input" data-i18n="searchLabel">
              포트폴리오 검색
            </label>
            <input
              id="search-input"
              type="search"
              autocomplete="off"
              spellcheck="false"
              data-i18n-placeholder="searchPlaceholder"
              placeholder="기술 또는 문제 검색"
            />
            <button
              id="search-close"
              class="close-button"
              type="button"
              aria-label="검색 닫기"
              title="검색 닫기"
            >
              <span aria-hidden="true">×</span>
            </button>
          </div>

          <div id="search-results" class="results" aria-live="polite"></div>

          <p id="empty-state" class="empty-state" hidden data-i18n="empty">
            검색 결과가 없습니다.
          </p>
        </div>

        <template id="result-template">
          <a
            class="result"
            href="./assets/portfolio.pdf"
            target="_blank"
            rel="noreferrer"
          >
            <span class="result-text">
              <strong></strong>
              <span></span>
            </span>
            <span class="result-arrow" aria-hidden="true">↗</span>
          </a>
        </template>
      </section>
    </main>
  </body>
</html>
